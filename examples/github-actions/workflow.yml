name: AI Cost Badge

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  update-badge:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for cost analysis
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install costs
      run: pip install costs
    
    - name: Update AI cost badge
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: |
        # Update badge using pyproject.toml config
        costs auto-badge --repo . --all
    
    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Only commit if README was modified
        if git diff --quiet HEAD -- README.md; then
          echo "No changes to README.md"
        else
          git add README.md
          git commit -m "[ai:auto] Update AI cost badge"
          git push
        fi
